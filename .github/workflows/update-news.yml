name: Update Parallax News Data

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Optional: Cache pip dependencies
          
      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install duckdb feedparser scikit-learn pandas pytz
          
      - name: Run Parallax News Agent
        run: |
          cd backend
          python main.py
          
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Only commit if there are changes to the backend files
          git add backend/news.duckdb backend/data.json
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No new news to commit."
          else
            git commit -m "Auto-update news data [skip ci]"
            git push
          fi
